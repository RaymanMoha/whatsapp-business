<svg width="183" height="34" viewBox="0 0 183 34" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-text { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        font-weight: 400;
        fill: white;
        font-size: 16px;
        letter-spacing: 0.3px;
      }
    </style>
  </defs>
  
  <!-- Clean square icon with border -->
  <rect x="8" y="8" width="18" height="18" fill="none" stroke="white" stroke-width="1.5" rx="2"/>
  
  <!-- Inner elements of the square icon -->
  <rect x="10" y="10" width="6" height="2" fill="white"/>
  <rect x="10" y="13" width="4" height="2" fill="white"/>
  <rect x="10" y="16" width="8" height="2" fill="white"/>
  <rect x="10" y="19" width="6" height="2" fill="white"/>
  <rect x="10" y="22" width="3" height="2" fill="white"/>
  
  <!-- Clean, simple text -->
  <text x="35" y="21" class="logo-text">Reon Capital</text>
</svg>
