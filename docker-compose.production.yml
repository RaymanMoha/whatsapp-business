services:
  dashboard:
    build:
      context: .
      target: web
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      PORT: 3000
      WAHA_BASE_URL: http://waha:3000
    depends_on:
      waha:
        condition: service_healthy
    networks: [commerce]

  bot:
    build:
      context: .
      target: bot
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      PORT: 8080
      WAHA_BASE_URL: http://waha:3000
    depends_on:
      waha:
        condition: service_healthy
    networks: [commerce]

  waha:
    image: devlikeapro/waha:gows-arm
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      WHATSAPP_API_PORT: 3000
      WHATSAPP_API_HOSTNAME: waha
      WHATSAPP_HOOK_URL: http://bot:8080/webhook
      WHATSAPP_HOOK_EVENTS: message
      WAHA_DASHBOARD_ENABLED: "true"
      WHATSAPP_SWAGGER_ENABLED: "false"
    volumes:
      - waha_sessions:/app/.sessions
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [commerce]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [dashboard]
    networks: [commerce]

networks:
  commerce:

volumes:
  waha_sessions:
  caddy_data:
  caddy_config:
